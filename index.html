<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetShop - Productos para tu mejor amigo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }

        .header-custom {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
            url('https://images.unsplash.com/photo-1450778869180-41d0601e046e?auto=format&fit=crop&q=80&w=1500');
            color: white;
            padding: 80px 0;
            text-align: center;
        }
    </style>
</head>

<body>

<header class="header-custom">
    <h1>🐶 PetShop</h1>
    <p>Productos para tu mejor amigo</p>
</header>

<div class="container my-5">

    <h2 class="text-success">Registro de productos</h2>

    <form id="formProducto" class="card p-3 shadow-sm">
        <input id="nombre" class="form-control mb-2" placeholder="Nombre del producto">
        <input id="descripcion" class="form-control mb-2" placeholder="Descripción">

        <select id="categoria" class="form-control mb-2">
            <option value="">Seleccione categoría</option>
            <option>Alimento</option>
            <option>Juguetes</option>
            <option>Higiene</option>
            <option>Snacks</option>
        </select>

        <button class="btn btn-success">Agregar producto</button>
    </form>

    <h4 class="mt-4">Total productos: <span id="contador">0</span></h4>

    <div id="listaProductos" class="row mt-3"></div>

</div>

<script src="script.js"></script>

</body>
</html>
